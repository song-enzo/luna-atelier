{% extends "base.html" %}
{% block title %}修改密码 — LUNA ATELIER{% endblock %}
{% block content %}

<div class="page-title" style="padding-bottom:12px;">
  <a href="{{ url_for('admin_dashboard') }}" style="font-size:12px;color:#888;text-decoration:none;">&larr; 返回仪表盘</a>
</div>

<div style="padding:0 16px;max-width:400px;">
  <div style="background:#f8f8f8;padding:20px;border-radius:4px;">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;color:#333;">修改管理员密码</h3>
    <form method="POST">
      <div class="form-group">
        <label>原密码</label>
        <input type="password" name="old_password" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" name="new_password" required minlength="4">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" name="confirm_password" required minlength="4">
      </div>
      <button type="submit" class="btn-admin dark" style="width:100%;">修改密码</button>
    </form>
  </div>
</div>
{% endblock %}
